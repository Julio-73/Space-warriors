                        document.getElementById('powerUpIndicator').classList.remove('active');
                    }
                }
                
                if (this.turboTime > 0) {
                    this.turboTime--;
                    if (this.turboTime === 0) {
                        this.turbo = false;
                    }
                }
                
                if (this.invulnerableTime > 0) {
                    this.invulnerableTime--;
                    if (this.invulnerableTime === 0) {
                        this.invulnerable = false;
                    }
                }
            }
            
            shoot() {
                const bulletSpeed = this.powerUp === 'rapidfire' ? 15 : 10;
                const bulletCount = this.powerUp === 'triple' ? 3 : 1;
                
                audioSystem.sounds.shoot();
                createMuzzleFlash(this.x, this.y - 35 * (this.height/80));
                
                for (let i = 0; i < bulletCount; i++) {
                    const angle = bulletCount > 1 ? (i - 1) * 0.2 : 0;
                    this.bullets.push(new Bullet(
                        this.x + Math.sin(angle) * 20 * (this.width/80),
                        this.y - 35 * (this.height/80),
                        Math.sin(angle) * 5,
                        -bulletSpeed,
                        'player'
                    ));
                }
            }
            
            shootMissile() {
                if (this.missiles.length < 3) {
                    this.missiles.push(new HomingMissile(this.x, this.y - 35 * (this.height/80)));
                    audioSystem.sounds.shoot();
                }
            }
        }
        
        // Misil teledirigido
        class HomingMissile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 8;
                this.target = null;
                this.active = true;
                this.trail = [];
                this.life = 180;
            }
            
            draw() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 10) {
                    this.trail.shift();
                }
                
                ctx.strokeStyle = 'rgba(255, 100, 0, 0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                this.trail.forEach((point, index) => {
                    if (index === 0) {
                        ctx.moveTo(point.x, point.y);
                    } else {
                        ctx.lineTo(point.x, point.y);
                    }
                });
                ctx.stroke();
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (this.target) {
                    const angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                    ctx.rotate(angle + Math.PI / 2);
                }
                
                ctx.fillStyle = '#ff6600';
                ctx.strokeStyle = '#ff3300';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(-5, 5);
                ctx.lineTo(0, 3);
                ctx.lineTo(5, 5);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.restore();
            }
            
            update() {
                this.life--;
                if (this.life <= 0) {
                    this.active = false;
                    return;
                }
                
                if (!this.target || !this.target.active) {
                    let minDist = Infinity;
                    enemies.forEach(enemy => {
                        if (enemy.active) {
                            const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                            if (dist < minDist && dist < 200) {
                                minDist = dist;
                                this.target = enemy;
                            }
                        }
                    });
                }
                
                if (this.target) {
                    const angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                } else {
                    this.y -= this.speed;
                }
                
                enemies.forEach(enemy => {
                    if (enemy.active) {
                        const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        if (dist < 30) {
                            enemy.takeDamage(3);
                            this.active = false;
                            createExplosion(this.x, this.y, 15);
                        }
                    }
                });
            }
        }
        
        // Clase para balas
        class Bullet {
            constructor(x, y, vx, vy, owner) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.owner = owner;
                this.radius = 4;
                this.active = true;
                this.trail = [];
            }
            
            draw() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 5) {
                    this.trail.shift();
                }
                
                ctx.strokeStyle = this.owner === 'player' ? 'rgba(0, 255, 255, 0.3)' : 'rgba(255, 0, 102, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                this.trail.forEach((point, index) => {
                    if (index === 0) {
                        ctx.moveTo(point.x, point.y);
                    } else {
                        ctx.lineTo(point.x, point.y);
                    }
                });
                ctx.stroke();
                
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.owner === 'player' ? '#00ffff' : '#ff0066';
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                if (this.owner === 'player') {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#00ffff');
                    gradient.addColorStop(1, 'rgba(0, 255, 255, 0.3)');
                } else {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#ff0066');
                    gradient.addColorStop(1, 'rgba(255, 0, 102, 0.3)');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y < -10 || this.y > canvas.height + 10 || 
                    this.x < -10 || this.x > canvas.width + 10) {
                    this.active = false;
                }
            }
        }
        
        // Tipos de enemigos
        class Enemy {
            constructor(x, y, type = 'basic') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.setupByType();
                this.bullets = [];
                this.shootCooldown = 0;
                this.movePattern = Math.random() * Math.PI * 2;
                this.active = true;
                this.rotation = 0;
            }
            
            setupByType() {
                const scale = isMobile ? 0.7 : 1;
                
                switch(this.type) {
                    case 'basic':
                        this.width = 60 * scale;
                        this.height = 60 * scale;
                        this.speed = 2 + Math.random() * 2;
                        this.health = 1;
                        this.points = 100;
                        this.color = '#ff0066';
                        break;
                    case 'fast':
                        this.width = 40 * scale;
                        this.height = 40 * scale;
                        this.speed = 5 + Math.random() * 3;
                        this.health = 1;
                        this.points = 150;
                        this.color = '#ffff00';
                        break;
                    case 'tank':
                        this.width = 80 * scale;
                        this.height = 80 * scale;
                        this.speed = 1;
                        this.health = 5;
                        this.points = 300;
                        this.color = '#ff00ff';
                        break;
                    case 'sniper':
                        this.width = 50 * scale;
                        this.height = 50 * scale;
                        this.speed = 1.5;
                        this.health = 2;
                        this.points = 200;
                        this.color = '#00ff00';
                        this.shootRange = 400;
                        break;
                    case 'kamikaze':
                        this.width = 45 * scale;
                        this.height = 45 * scale;
                        this.speed = 4;
                        this.health = 1;
                        this.points = 250;
                        this.color = '#ff6600';
                        this.targetPlayer = true;
                        break;
                    case 'boss':
                        this.width = 100 * scale;
                        this.height = 100 * scale;
                        this.speed = 1;
                        this.health = 15;
                        this.points = 500;
                        this.color = '#9c27b0';
                        break;
                    case 'asteroid':
                        this.width = (60 + Math.random() * 40) * scale;
                        this.height = this.width;
                        this.speed = 1 + Math.random();
                        this.health = 3;
                        this.points = 50;
                        this.color = '#8b7355';
                        this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                        break;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (this.type === 'asteroid') {
                    ctx.rotate(this.rotation);
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 * i) / 8;
                        const radius = this.width / 2 + Math.sin(i * 1.5) * 10;
                        if (i === 0) {
                            ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                        } else {
                            ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                        }
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'boss') {
                    this.rotation += 0.02;
                    ctx.rotate(this.rotation);
                    
                    const bossGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 40 * (this.width/100));
                    bossGradient.addColorStop(0, '#4a148c');
                    bossGradient.addColorStop(0.5, '#6a1b9a');
                    bossGradient.addColorStop(1, '#311b92');
                    
                    ctx.fillStyle = bossGradient;
                    ctx.strokeStyle = '#9c27b0';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 40 * (this.width/100), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    for (let i = 0; i < 6; i++) {
                        ctx.save();
                        ctx.rotate((Math.PI * 2 * i) / 6);
                        ctx.fillStyle = '#6a1b9a';
                        ctx.strokeStyle = '#9c27b0';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(40 * (this.width/100), 0);
                        ctx.lineTo(70 * (this.width/100), -15 * (this.height/100));
                        ctx.lineTo(70 * (this.width/100), 15 * (this.height/100));
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                    }
                    
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 15 * (this.width/100), 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    this.rotation += 0.02;
                    ctx.rotate(this.rotation);
                    
                    ctx.fillStyle = '#1a1a1a';
                    ctx.strokeStyle = '#333333';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15 * (this.width/60), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#000033';
                    ctx.beginPath();
                    ctx.arc(0, 0, 8 * (this.width/60), 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#2d2d2d';
                    ctx.strokeStyle = '#444444';
                    ctx.lineWidth = 2;
                    
                    ctx.beginPath();
                    ctx.moveTo(-40 * (this.width/60), -20 * (this.height/60));
                    ctx.lineTo(-20 * (this.width/60), -25 * (this.height/60));
                    ctx.lineTo(-20 * (this.width/60), 25 * (this.height/60));
                    ctx.lineTo(-40 * (this.width/60), 20 * (this.height/60));
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(40 * (this.width/60), -20 * (this.height/60));
                    ctx.lineTo(20 * (this.width/60), -25 * (this.height/60));
                    ctx.lineTo(20 * (this.width/60), 25 * (this.height/60));
                    ctx.lineTo(40 * (this.width/60), 20 * (this.height/60));
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.strokeStyle = '#666666';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(-20 * (this.width/60), 0);
                    ctx.lineTo(-15 * (this.width/60), 0);
                    ctx.moveTo(20 * (this.width/60), 0);
                    ctx.lineTo(15 * (this.width/60), 0);
                    ctx.stroke();
                    
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(-30 * (this.width/60), 0, 3 * (this.width/60), 0, Math.PI * 2);
                    ctx.arc(30 * (this.width/60), 0, 3 * (this.width/60), 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            update() {
                if (this.type === 'asteroid') {
                    this.rotation += this.rotationSpeed;
                }
                
                if (this.type === 'kamikaze' && player) {
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                } else {
                    this.movePattern += 0.05;
                    this.x += Math.sin(this.movePattern) * 2;
                    this.y += this.speed;
                }
                
                this.shootCooldown--;
                if (this.shootCooldown <= 0 && this.y < canvas.height - 100) {
                    if (this.type === 'sniper' && player) {
                        const dist = Math.hypot(player.x - this.x, player.y - this.y);
                        if (dist < this.shootRange) {
                            this.shoot();
                            this.shootCooldown = 40;
                        }
                    } else if (this.type !== 'asteroid' && this.type !== 'kamikaze') {
                        this.shoot();
                        this.shootCooldown = this.type === 'boss' ? 20 : 60 + Math.random() * 60;
                    }
                }
                
                if (this.y > canvas.height + 50) {
                    this.active = false;
                }
            }
            
            shoot() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.bullets.push(new Bullet(
                    this.x,
                    this.y + this.height/2,
                    Math.cos(angle) * 3,
                    Math.sin(angle) * 3,
                    'enemy'
                ));
            }
            
            takeDamage(damage = 1) {
                this.health -= damage;
                if (this.health <= 0) {
                    this.active = false;
                    createExplosion(this.x, this.y, this.type === 'boss' ? 40 : 20);
                    score += this.points;
                    updateScore();
                    
                    enemiesKilled++;
                    if (this.type === 'boss') {
                        achievementSystem.bossesKilled++;
                    }
                    
                    combo++;
                    comboTimer = 60;
                    if (combo > achievementSystem.maxCombo) {
                        achievementSystem.maxCombo = combo;
                    }
                    showCombo();
                    
                    if (Math.random() < 0.15) {
                        powerUps.push(new PowerUp(this.x, this.y));
                    }
                }
            }
        }
        
        // Power-ups mejorados
        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const types = ['shield', 'rapidfire', 'triple', 'health', 'missile', 'laserbeam', 'timefreeze', 'bomb'];
                this.type = types[Math.floor(Math.random() * types.length)];
                this.radius = 15;
                this.active = true;
                this.pulse = 0;
                this.rotation = 0;
            }
            
            draw() {
                this.pulse += 0.1;
                this.rotation += 0.05;
                const scale = 1 + Math.sin(this.pulse) * 0.2;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(scale, scale);
                
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.getColor();
                
                ctx.strokeStyle = this.getColor();
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 5]);
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.fillStyle = this.getColor() + '33';
                ctx.strokeStyle = this.getColor();
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 * i) / 6;
                    const x = Math.cos(angle) * (this.radius - 5);
                    const y = Math.sin(angle) * (this.radius - 5);
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.getIcon(), 0, 0);
                
                ctx.restore();
            }
            
            update() {
                this.y += 2;
                if (this.y > canvas.height + 20) {
                    this.active = false;
                }
            }
            
            getColor() {
                switch(this.type) {
                    case 'shield': return '#00ffff';
                    case 'rapidfire': return '#ffff00';
                    case 'triple': return '#ff00ff';
                    case 'health': return '#00ff00';
                    case 'missile': return '#ff6600';
                    case 'laserbeam': return '#ff0066';
                    case 'timefreeze': return '#9966ff';
                    case 'bomb': return '#ff3333';
                    default: return '#ffffff';
                }
            }
            
            getIcon() {
                switch(this.type) {
                    case 'shield': return '🛡';
                    case 'rapidfire': return '⚡';
                    case 'triple': return '⫸';
                    case 'health': return '❤';
                    case 'missile': return '🚀';
                    case 'laserbeam': return '⚡';
                    case 'timefreeze': return '❄';
                    case 'bomb': return '💣';
                    default: return '?';
                }
            }
        }
        
        // Clase para explosiones
        class Particle {
            constructor(x, y, vx, vy, color, size) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = 1;
                this.decay = 0.02;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.98;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
        }
        
        // Variables globales
        let player;
        let enemies = [];
        let particles = [];
        let powerUps = [];
        let enemySpawnTimer = 0;
        let bossSpawnTimer = 0;
        let timeFreezeActive = false;
        let timeFreezeTimer = 0;
        let laserBeamActive = false;
        let laserBeamTimer = 0;
        let missionTarget = 0;
        let missionProgress = 0;
        let timeLimit = 0;
        let timeRemaining = 0;
        
        // Event listeners para PC
        if (!isMobile) {
            document.addEventListener('keydown', (e) => {
                switch(e.key.toLowerCase()) {
                    case 'a': input.left = true; break;
                    case 'd': input.right = true; break;
                    case 'w': input.up = true; break;
                    case 's': input.down = true; break;
                    case ' ': 
                        e.preventDefault();
                        input.shoot = true; 
                        break;
                    case 'shift': input.turbo = true; break;
                    case 'm': input.missile = true; break;
                    case 'p': input.pause = true; break;
                }
            });
            
            document.addEventListener('keyup', (e) => {
                switch(e.key.toLowerCase()) {
                    case 'a': input.left = false; break;
                    case 'd': input.right = false; break;
                    case 'w': input.up = false; break;
                    case 's': input.down = false; break;
                    case ' ': input.shoot = false; break;
                    case 'shift': input.turbo = false; break;
                    case 'm': input.missile = false; break;
                    case 'p': input.pause = false; break;
                }
            });
        }
        
        // Funciones del juego
        function createMuzzleFlash(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(
                    x + (Math.random() - 0.5) * 10,
                    y,
                    (Math.random() - 0.5) * 2,
                    Math.random() * 2,
                    '#00ffff',
                    2
                ));
            }
        }
        
        function createExplosion(x, y, particleCount) {
            audioSystem.sounds.explosion();
            
            const actualCount = isMobile ? Math.floor(particleCount * 0.7) : particleCount;
            
            for (let i = 0; i < actualCount; i++) {
                const angle = (Math.PI * 2 * i) / actualCount;
                const speed = 2 + Math.random() * 6;
                const color = ['#ff0066', '#ff6600', '#ffff00', '#ffffff', '#00ffff'][Math.floor(Math.random() * 5)];
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    color,
                    2 + Math.random() * 6
                ));
            }
        }
        
        function showCombo() {
            if (combo > 1) {
                const indicator = document.getElementById('comboIndicator');
                indicator.textContent = `COMBO x${combo}`;
                indicator.classList.remove('show');
                void indicator.offsetWidth;
                indicator.classList.add('show');
            }
        }
        
        function handleInput() {
            if (!player || timeFreezeActive) return;
            
            const speed = player.turbo ? player.speed * 2 : player.speed;
            const margin = isMobile ? 30 : 40;
            
            if (input.left && player.x > margin) {
                player.x -= speed;
            }
            if (input.right && player.x < canvas.width - margin) {
                player.x += speed;
            }
            if (input.up && player.y > margin) {
                player.y -= speed;
            }
            if (input.down && player.y < canvas.height - margin) {
                player.y += speed;
            }
            
            if (input.shoot) {
                player.shoot();
                input.shoot = false;
            }
            
            if (input.missile) {
                player.shootMissile();
                input.missile = false;
            }
            
            if (input.turbo && !player.turbo) {
                player.turbo = true;
                player.turboTime = 30;
            }
            
            if (input.pause) {
                togglePause();
                input.pause = false;
            }
        }
        
        function spawnEnemy() {
            const x = Math.random() * (canvas.width - 100) + 50;
            const types = ['basic', 'fast', 'tank', 'sniper', 'kamikaze'];
            const type = types[Math.floor(Math.random() * Math.min(types.length, level))];
            
            if (Math.random() < 0.1 && level > 2) {
                enemies.push(new Enemy(x, -60, 'asteroid'));
            } else {
                enemies.push(new Enemy(x, -60, type));
            }
        }
        
        function spawnBoss() {
            const x = canvas.width / 2;
            enemies.push(new Enemy(x, -120, 'boss'));
        }
        
        function checkCollisions() {
            player.bullets.forEach(bullet => {
                if (!bullet.active) return;
                
                enemies.forEach(enemy => {
                    if (!enemy.active) return;
                    
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < enemy.width / 2 + bullet.radius) {
                        bullet.active = false;
                        enemy.takeDamage();
                    }
                });
            });
            
            player.missiles = player.missiles.filter(missile => {
                missile.update();
                return missile.active;
            });
            
            enemies.forEach(enemy => {
                enemy.bullets.forEach(bullet => {
                    if (!bullet.active) return;
                    
                    const dx = bullet.x - player.x;
                    const dy = bullet.y - player.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 30 + bullet.radius) {
                        bullet.active = false;
                        if (player.powerUp !== 'shield' && !player.invulnerable) {
                            player.health -= 10;
                            updateHealth();
                            createExplosion(player.x, player.y, 10);
                            audioSystem.sounds.hit();
                            achievementSystem.levelWithoutDamage = false;
                            
                            if (player.health <= 0) {
                                gameOver();
                            }
                        }
                    }
                });
            });
            
            powerUps.forEach(powerUp => {
                if (!powerUp.active) return;
                
                const dx = powerUp.x - player.x;
                const dy = powerUp.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 30 + powerUp.radius) {
                    powerUp.active = false;
                    applyPowerUp(powerUp.type);
                    achievementSystem.powerUpsCollected++;
                }
            });
            
            enemies.forEach(enemy => {
                if (!enemy.active) return;
                
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < (enemy.width + player.width) / 2) {
                    if (player.powerUp !== 'shield' && !player.invulnerable) {
                        player.health -= 20;
                        updateHealth();
                        createExplosion(player.x, player.y, 15);
                        enemy.active = false;
                        createExplosion(enemy.x, enemy.y, 25);
                        audioSystem.sounds.hit();
                        achievementSystem.levelWithoutDamage = false;
                        
                        if (player.health <= 0) {
                            gameOver();
                        }
                    }
                }
            });
        }
        
        function applyPowerUp(type) {
            audioSystem.sounds.powerup();
            player.powerUp = type;
            player.powerUpTime = 300;
            
            const indicator = document.getElementById('powerUpIndicator');
            const text = document.getElementById('powerUpText');
            
            switch(type) {
                case 'shield':
                    text.textContent = 'ESCUDO ACTIVADO';
                    break;
                case 'rapidfire':
                    text.textContent = 'DISPARO RÁPIDO';
                    break;
                case 'triple':
                    text.textContent = 'TRIPLE DISPARO';
                    break;
                case 'health':
                    player.health = Math.min(player.health + 30, player.maxHealth);
                    updateHealth();
                    text.textContent = 'SALUD RESTAURADA';
                    break;
                case 'missile':
                    text.textContent = 'MISILES TELEDIRIGIDOS';
                    player.shootMissile();
                    player.shootMissile();
                    player.shootMissile();
                    break;
                case 'laserbeam':
                    text.textContent = 'RAYO LÁSER ACTIVADO';
                    laserBeamActive = true;
                    laserBeamTimer = 180;
                    break;
                case 'timefreeze':
                    text.textContent = 'TIEMPO CONGELADO';
                    timeFreezeActive = true;
                    timeFreezeTimer = 180;
                    break;
                case 'bomb':
                    text.textContent = 'BOMBA DESTRUCCIÓN';
                    enemies.forEach(enemy => {
                        if (enemy.active) {
                            enemy.takeDamage(5);
                        }
                    });
                    createExplosion(canvas.width / 2, canvas.height / 2, 50);
                    break;
            }
            
            indicator.classList.add('active');
            setTimeout(() => {
                if (type === 'health' || type === 'missile' || type === 'bomb') {
                    indicator.classList.remove('active');
                }
            }, 2000);
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        function updateHealth() {
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('healthBar').style.width = healthPercent + '%';
        }
        
        function updateLevel() {
            document.getElementById('level').textContent = level;
            
            const transition = document.getElementById('levelTransition');
            transition.textContent = `NIVEL ${level}`;
            transition.style.display = 'block';
            setTimeout(() => {
                transition.style.display = 'none';
            }, 2000);
        }
        
        function nextLevel() {
            level++;
            updateLevel();
            levelComplete = false;
            achievementSystem.levelWithoutDamage = true;
            
            enemies = [];
            powerUps = [];
            particles = [];
            
            if (gameMode === 'mission') {
                setupMission();
            }
            
            enemySpawnTimer = Math.max(20, 120 - level * 10);
            bossSpawnTimer = Math.max(300, 600 - level * 50);
        }
        
        function setupMission() {
            const missions = [
                {target: 10, desc: 'Destruye 10 naves enemigas'},
                {target: 500, desc: 'Alcanza 500 puntos'},
                {target: 3, desc: 'Derrota 3 jefes'},
                {target: 20, desc: 'Recolecta 20 power-ups'},
                {target: 60, desc: 'Sobrevive 60 segundos'}
            ];
            
            const mission = missions[level % missions.length];
            missionTarget = mission.target;
            missionProgress = 0;
            
            const objective = document.getElementById('missionObjective');
            objective.querySelector('.mission-text').textContent = `MISIÓN: ${mission.desc}`;
            objective.classList.add('show');
        }
        
        function drawBackground() {
            const bg = spaceBackgrounds[(level - 1) % spaceBackgrounds.length];
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, bg.colors[0]);
            gradient.addColorStop(0.5, bg.colors[1]);
            gradient.addColorStop(1, bg.colors[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const offset = Date.now() * 0.01;
            const gridSize = isMobile ? 40 : 50;
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i + (offset % gridSize), 0);
                ctx.lineTo(i + (offset % gridSize), canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i + (offset % gridSize));
                ctx.lineTo(canvas.width, i + (offset % gridSize));
                ctx.stroke();
            }
        }
        
        function drawLaserBeam() {
            if (laserBeamActive) {
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)';
                ctx.lineWidth = 10;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff00ff';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - 35 * (player.height/80));
                ctx.lineTo(player.x, 0);
                ctx.stroke();
                
                enemies.forEach(enemy => {
                    if (enemy.active && Math.abs(enemy.x - player.x) < 30 && enemy.y < player.y) {
                        enemy.takeDamage(0.5);
                    }
                });
            }
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            handleInput();
            
            if (comboTimer > 0) {
                comboTimer--;
            } else {
                combo = 0;
            }
            
            if (timeFreezeActive) {
                timeFreezeTimer--;
                if (timeFreezeTimer <= 0) {
                    timeFreezeActive = false;
                }
            }
            
            if (laserBeamActive) {
                laserBeamTimer--;
                if (laserBeamTimer <= 0) {
                    laserBeamActive = false;
                }
            }
            
            if (!timeFreezeActive) {
                enemySpawnTimer--;
                if (enemySpawnTimer <= 0) {
                    spawnEnemy();
                    enemySpawnTimer = Math.max(20, 120 - level * 10);
                }
                
                bossSpawnTimer--;
                if (bossSpawnTimer <= 0) {
                    spawnBoss();
                    bossSpawnTimer = Math.max(300, 600 - level * 50);
                }
            }
            
            player.update();
            player.draw();
            
            drawLaserBeam();
            
            player.bullets = player.bullets.filter(bullet => {
                bullet.update();
                bullet.draw();
                return bullet.active;
            });
            
            player.missiles.forEach(missile => {
                missile.draw();
            });
            
            enemies = enemies.filter(enemy => {
                if (!timeFreezeActive) {
                    enemy.update();
                }
                enemy.draw();
                
                if (!timeFreezeActive) {
                    enemy.bullets = enemy.bullets.filter(bullet => {
                        bullet.update();
                        bullet.draw();
                        return bullet.active;
                    });
                } else {
                    enemy.bullets.forEach(bullet => {
                        bullet.draw();
                    });
                }
                
                return enemy.active;
            });
            
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.life > 0;
            });
            
            powerUps = powerUps.filter(powerUp => {
                if (!timeFreezeActive) {
                    powerUp.update();
                }
                powerUp.draw();
                return powerUp.active;
            });
            
            checkCollisions();
            
            if (gameMode === 'mission') {
                checkMissionProgress();
            } else if (enemies.length === 0 && enemySpawnTimer < 0) {
                levelComplete = true;
                nextLevel();
            }
            
            if (gameMode === 'timeattack') {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    gameOver();
                }
            }
            
            achievementSystem.checkAchievements({score, level, levelComplete});
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function checkMissionProgress() {
            let completed = false;
            
            switch(missionTarget) {
                case 10:
                    missionProgress = enemiesKilled;
                    completed = missionProgress >= 10;
                    break;
                case 500:
                    missionProgress = score;
                    completed = missionProgress >= 500;
                    break;
                case 3:
                    missionProgress = achievementSystem.bossesKilled;
                    completed = missionProgress >= 3;
                    break;
                case 20:
                    missionProgress = achievementSystem.powerUpsCollected;
                    completed = missionProgress >= 20;
                    break;
                case 60:
                    missionProgress = Math.floor((Date.now() - achievementSystem.startTime) / 1000);
                    completed = missionProgress >= 60;
                    break;
            }
            
            if (completed) {
                levelComplete = true;
                nextLevel();
            }
        }
        
        function startGame(mode = 'classic') {
            document.getElementById('menuScreen').classList.add('hidden');
            gameRunning = true;
            gameMode = mode;
            score = 0;
            level = 1;
            enemiesKilled = 0;
            combo = 0;
            
            if (!audioSystem.audioContext) {
                audioSystem.init();
            }
            audioSystem.sounds.music();
            
            const modeNames = {
                'classic': 'CLÁSICO',
                'survival': 'SUPERVIVENCIA',
                'timeattack': 'CONTRARRELOJ',
                'mission': 'MISIÓN'
            };
            document.getElementById('gameMode').textContent = modeNames[mode];
            
            player = new Player();
            enemies = [];
            particles = [];
            powerUps = [];
            enemySpawnTimer = 60;
            bossSpawnTimer = 300;
            
            if (mode === 'timeattack') {
                timeLimit = 120;
                timeRemaining = timeLimit * 60;
            } else if (mode === 'mission') {
                setupMission();
            }
            
            updateScore();
            updateHealth();
            updateLevel();
            
            gameLoop();
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            audioSystem.stopMusic();
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('enemiesDestroyed').textContent = enemiesKilled;
            document.getElementById('gameOverScreen').classList.add('show');
        }
        
        function backToMenu() {
            document.getElementById('gameOverScreen').classList.remove('show');
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('missionObjective').classList.remove('show');
        }
        
        function toggleSound() {
            audioSystem.enabled = !audioSystem.enabled;
            document.getElementById('soundToggle').textContent = audioSystem.enabled ? '🔊' : '🔇';
        }
        
        function togglePause() {
            gameRunning = !gameRunning;
            if (gameRunning) {
                gameLoop();
            }
        }
        
        function showGameModes() {
            const modes = [
                {name: 'CLÁSICO', desc: 'Niveles progresivos infinitos', mode: 'classic'},
                {name: 'SUPERVIVENCIA', desc: 'Sobrevive el mayor tiempo posible', mode: 'survival'},
                {name: 'CONTRARRELOJ', desc: 'Maxima puntuación en 2 minutos', mode: 'timeattack'},
                {name: 'MISIÓN', desc: 'Completa objetivos específicos', mode: 'mission'}
            ];
            
            let modeHTML = '<h3 style="color: #00ffff; margin-bottom: 20px;">SELECCIONAR MODO DE JUEGO</h3>';
            modes.forEach(m => {
                modeHTML += `
                    <button class="game-btn" onclick="startGame('${m.mode}')" style="margin: 10px;">
                        ${m.name}<br>
                        <small style="font-size: 14px; opacity: 0.8;">${m.desc}</small>
                    </button>
                `;
            });
            
            const menuScreen = document.getElementById('menuScreen');
            menuScreen.querySelector('.menu-buttons').innerHTML = modeHTML + 
                '<button class="game-btn" onclick="location.reload()" style="margin-top: 20px;">VOLVER</button>';
        }
        
        function showAchievements() {
            achievementSystem.renderAchievements();
            document.getElementById('achievementsPanel').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('achievementsPanel').classList.remove('show');
            }, 5000);
        }
        
        function showControls() {
            const controls = `
                <h3 style="color: #00ffff; margin-bottom: 20px;">CONTROLES</h3>
                <div style="text-align: left; max-width: 400px;">
                    <div class="control-item"><span class="control-key">PC:</span> WASD + ESPACIO</div>
                    <div class="control-item"><span class="control-key">Móvil:</span> Joystick + Botones</div>
                    <div class="control-item"><span class="control-key">🔫</span> - Disparar</div>
                    <div class="control-item"><span class="control-key">⚡</span> - Turbo</div>
                    <div class="control-item"><span class="control-key">🚀</span> - Misiles</div>
                    <div class="control-item"><span class="control-key">⏸️</span> - Pausa</div>
                </div>
                <button class="game-btn" onclick="location.reload()" style="margin-top: 20px;">VOLVER</button>
            `;
            
            const menuScreen = document.getElementById('menuScreen');
            menuScreen.querySelector('.menu-buttons').innerHTML = controls;
        }
        
        // Prevenir zoom en móviles
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('touchmove', function(e) {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, {passive: false});
    </script>
</body>
</html>
