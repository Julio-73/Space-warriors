<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SPACE WARRIORS - Edición Definitiva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%);
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            touch-action: none;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-header {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .score-panel, .health-panel, .level-panel, .mode-panel {
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1));
            border: 2px solid rgba(0,255,255,0.5);
            border-radius: 10px;
            padding: 8px 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        
        .score-label, .health-label, .level-label, .mode-label {
            font-size: 12px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        
        .score-value, .health-bar, .level-value, .mode-value {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,255,255,0.8);
        }
        
        .health-bar-container {
            width: 120px;
            height: 15px;
            background: rgba(255,0,0,0.2);
            border: 2px solid rgba(255,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 3px;
        }
        
        .health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #ff3366);
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(255,0,102,0.8);
        }
        
        #gameCanvas {
            border: 2px solid rgba(0,255,255,0.5);
            border-radius: 15px;
            box-shadow: 
                0 0 30px rgba(0,255,255,0.5),
                inset 0 0 30px rgba(0,255,255,0.1);
            background: radial-gradient(ellipse at center, rgba(0,20,40,0.9), rgba(0,0,0,0.95));
            max-width: 100%;
            max-height: 100%;
        }
        
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(0,20,40,0.95), rgba(0,0,0,0.98));
            z-index: 100;
            transition: opacity 0.5s ease;
            padding: 20px;
        }
        
        .menu-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .game-title {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 900;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 30px rgba(0,255,255,0.5);
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-align: center;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: #00ffff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .game-btn {
            padding: 15px 30px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2));
            border: 3px solid rgba(0,255,255,0.7);
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        
        .game-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0,255,255,0.5), transparent);
            transition: width 0.5s, height 0.5s;
            transform: translate(-50%, -50%);
        }
        
        .game-btn:hover::before, .game-btn:active::before {
            width: 300px;
            height: 300px;
        }
        
        .game-btn:hover, .game-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,255,255,0.5);
            border-color: #00ffff;
        }
        
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0,255,255,0.3);
            max-width: 90%;
        }
        
        .controls-info h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .control-item {
            margin: 5px 0;
            font-size: 12px;
            color: #aaa;
        }
        
        .control-key {
            color: #ff00ff;
            font-weight: bold;
        }
        
        .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            display: none;
            padding: 20px;
            max-width: 90%;
        }
        
        .game-over-screen.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .game-over-title {
            font-size: clamp(36px, 6vw, 60px);
            font-weight: 900;
            color: #ff0066;
            text-shadow: 0 0 20px rgba(255,0,102,0.8);
            margin-bottom: 15px;
        }
        
        .final-score {
            font-size: clamp(18px, 3vw, 30px);
            color: #00ffff;
            margin-bottom: 20px;
        }
        
        .power-up-indicator {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            border: 2px solid gold;
            border-radius: 20px;
            color: gold;
            font-weight: bold;
            display: none;
            animation: pulse 1s infinite;
            z-index: 50;
            font-size: 14px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        .power-up-indicator.active {
            display: block;
        }
        
        .achievements-panel {
            position: absolute;
            right: 10px;
            top: 80px;
            width: 200px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 15px;
            padding: 15px;
            display: none;
            z-index: 50;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .achievements-panel.show {
            display: block;
        }
        
        .achievement-title {
            color: gold;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
        }
        
        .achievement-item {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .achievement-icon {
            font-size: 20px;
        }
        
        .achievement-text {
            flex: 1;
        }
        
        .achievement-name {
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
        
        .achievement-desc {
            color: #aaa;
            font-size: 10px;
        }
        
        .achievement-item.unlocked {
            background: rgba(255,215,0,0.2);
            border-color: gold;
        }
        
        .sound-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,255,255,0.2);
            border: 2px solid rgba(0,255,255,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .sound-toggle:hover {
            background: rgba(0,255,255,0.3);
            transform: scale(1.1);
        }
        
        .level-transition {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0,255,255,0.8);
            display: none;
            z-index: 300;
            animation: levelPulse 2s ease;
        }
        
        @keyframes levelPulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        
        .combo-indicator {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 900;
            color: gold;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            display: none;
            z-index: 50;
        }
        
        .combo-indicator.show {
            display: block;
            animation: comboAnimation 1s ease;
        }
        
        @keyframes comboAnimation {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(1); }
        }
        
        .mission-objective {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,255,0,0.2);
            border: 2px solid rgba(0,255,0,0.5);
            border-radius: 15px;
            padding: 10px 20px;
            display: none;
            z-index: 50;
            max-width: 90%;
        }
        
        .mission-objective.show {
            display: block;
        }
        
        .mission-text {
            color: #00ff00;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
        }
        
        /* Controles Móviles */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            pointer-events: none;
        }
        
        .mobile-controls.show {
            display: flex;
        }
        
        .joystick-container {
            position: relative;
            width: 120px;
            height: 120px;
            pointer-events: all;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,255,255,0.2);
            border: 2px solid rgba(0,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .joystick-handle {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00ffff, #0088ff);
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: absolute;
            transition: none;
            box-shadow: 0 0 20px rgba(0,255,255,0.8);
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }
        
        .action-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(255,0,255,0.3), rgba(255,0,102,0.3));
            border: 2px solid rgba(255,0,255,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 0 20px rgba(255,0,255,0.5);
        }
        
        .action-btn:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, rgba(255,0,255,0.5), rgba(255,0,102,0.5));
            box-shadow: 0 0 30px rgba(255,0,255,0.8);
        }
        
        .special-buttons {
            position: absolute;
            bottom: 150px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }
        
        .special-buttons.show {
            display: flex;
        }
        
        .special-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,140,0,0.3));
            border: 2px solid rgba(255,215,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .special-btn:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, rgba(255,215,0,0.5), rgba(255,140,0,0.5));
            box-shadow: 0 0 30px rgba(255,215,0,0.8);
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .game-header {
                padding: 0 10px;
                top: 5px;
            }
            
            .score-panel, .health-panel, .level-panel, .mode-panel {
                padding: 5px 10px;
            }
            
            .sound-toggle {
                width: 35px;
                height: 35px;
                font-size: 18px;
                top: 5px;
                right: 5px;
            }
            
            .controls-info {
                display: none;
            }
            
            .mobile-controls.show {
                display: flex;
            }
            
            .special-buttons.show {
                display: flex;
            }
        }
        
        @media (orientation: landscape) and (max-height: 600px) {
            .game-header {
                top: 5px;
            }
            
            .mobile-controls {
                bottom: 10px;
                padding: 0 10px;
            }
            
            .joystick-container {
                width: 80px;
                height: 80px;
            }
            
            .joystick-handle {
                width: 35px;
                height: 35px;
            }
            
            .action-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
            
            .special-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
        
        /* Optimización para móviles */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            overscroll-behavior: none;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="game-container">
        <div class="game-header">
            <div class="score-panel">
                <div class="score-label">Puntuación</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="level-panel">
                <div class="level-label">Nivel</div>
                <div class="level-value" id="level">1</div>
            </div>
            <div class="mode-panel">
                <div class="mode-label">Modo</div>
                <div class="mode-value" id="gameMode">CLÁSICO</div>
            </div>
            <div class="health-panel">
                <div class="health-label">Escudo</div>
                <div class="health-bar-container">
                    <div class="health-bar-fill" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <!-- Controles Móviles -->
        <div class="mobile-controls" id="mobileControls">
            <div class="joystick-container">
                <div class="joystick-base">
                    <div class="joystick-handle" id="joystickHandle"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="shootBtn">🔫</button>
                <button class="action-btn" id="turboBtn">⚡</button>
                <button class="action-btn" id="pauseBtn">⏸️</button>
            </div>
        </div>
        
        <div class="special-buttons" id="specialButtons">
            <button class="special-btn" id="missileBtn">🚀</button>
            <button class="special-btn" id="shieldBtn">🛡️</button>
        </div>
        
        <div class="menu-screen" id="menuScreen">
            <h1 class="game-title">SPACE WARRIORS</h1>
            <p class="subtitle">Edición Definitiva</p>
            <div class="menu-buttons">
                <button class="game-btn" onclick="showGameModes()">SELECCIONAR MODO</button>
                <button class="game-btn" onclick="showAchievements()">LOGROS</button>
                <button class="game-btn" onclick="showControls()">CONTROLES</button>
            </div>
            <div class="controls-info">
                <h3>Controles</h3>
                <div class="control-item"><span class="control-key">PC:</span> WASD + ESPACIO</div>
                <div class="control-item"><span class="control-key">Móvil:</span> Joystick + Botones</div>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <h2 class="game-over-title">MISIÓN COMPLETADA</h2>
            <div class="final-score">Puntuación Final: <span id="finalScore">0</span></div>
            <div class="final-score">Nivel Alcanzado: <span id="finalLevel">1</span></div>
            <div class="final-score">Enemigos Derrotados: <span id="enemiesDestroyed">0</span></div>
            <button class="game-btn" onclick="backToMenu()">MENÚ PRINCIPAL</button>
        </div>
        
        <div class="power-up-indicator" id="powerUpIndicator">
            <span id="powerUpText">POWER-UP ACTIVADO</span>
        </div>
        
        <div class="achievements-panel" id="achievementsPanel">
            <div class="achievement-title">🏆 LOGROS</div>
            <div id="achievementsList"></div>
        </div>
        
        <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
        
        <div class="level-transition" id="levelTransition">NIVEL 1</div>
        
        <div class="combo-indicator" id="comboIndicator">COMBO x2</div>
        
        <div class="mission-objective" id="missionObjective">
            <div class="mission-text">MISIÓN: Destruye 10 naves enemigas</div>
        </div>
    </div>
    
    <script>
        // Detectar dispositivo móvil
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                        (window.innerWidth <= 768 && 'ontouchstart' in window);
        
        // Sistema de Audio
        class AudioSystem {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.sounds = {};
                this.musicPlaying = false;
            }
            
            init() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.generateSounds();
                } catch (e) {
                    console.log('Audio no disponible');
                }
            }
            
            generateSounds() {
                this.sounds.shoot = () => this.playLaser();
                this.sounds.explosion = () => this.playExplosion();
                this.sounds.powerup = () => this.playPowerUp();
                this.sounds.hit = () => this.playHit();
                this.sounds.music = () => this.playMusic();
            }
            
            playLaser() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, this.audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.1);
            }
            
            playExplosion() {
                if (!this.enabled || !this.audioContext) return;
                
                const bufferSize = this.audioContext.sampleRate * 0.5;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() - 0.5) * Math.exp(-i / (bufferSize * 0.1));
                }
                
                const source = this.audioContext.createBufferSource();
                const gainNode = this.audioContext.createGain();
                
                source.buffer = buffer;
                source.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                gainNode.gain.setValueAtTime(0.5, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                
                source.start();
            }
            
            playPowerUp() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, this.audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.3);
            }
            
            playHit() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(200, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.4, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.2);
            }
            
            playMusic() {
                if (!this.enabled || !this.audioContext || this.musicPlaying) return;
                
                this.musicPlaying = true;
                const playNote = (frequency, startTime, duration) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(frequency, startTime);
                    gainNode.gain.setValueAtTime(0.05, startTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    
                    oscillator.start(startTime);
                    oscillator.stop(startTime + duration);
                };
                
                const melody = [
                    {note: 261.63, duration: 0.2},
                    {note: 329.63, duration: 0.2},
                    {note: 392.00, duration: 0.2},
                    {note: 523.25, duration: 0.4},
                    {note: 392.00, duration: 0.2},
                    {note: 329.63, duration: 0.2},
                    {note: 261.63, duration: 0.4},
                ];
                
                const playMelody = () => {
                    if (!this.musicPlaying) return;
                    
                    let currentTime = this.audioContext.currentTime;
                    melody.forEach(({note, duration}) => {
                        playNote(note, currentTime, duration);
                        currentTime += duration;
                    });
                    
                    setTimeout(playMelody, 3000);
                };
                
                playMelody();
            }
            
            stopMusic() {
                this.musicPlaying = false;
            }

        class MobileControls {
            constructor() {
                this.joystickActive = false;
                this.joystickX = 0;
                this.joystickY = 0;
                this.setupJoystick();
                this.setupButtons();
            }
            
            setupJoystick() {
                const joystickContainer = document.querySelector('.joystick-container');
                const joystickHandle = document.getElementById('joystickHandle');
                
                const handleStart = (e) => {
                    e.preventDefault();
                    this.joystickActive = true;
                    this.updateJoystick(e);
                };
                
                const handleMove = (e) => {
                    e.preventDefault();
                    if (this.joystickActive) {
                        this.updateJoystick(e);
                    }
                };
                
                const handleEnd = (e) => {
                    e.preventDefault();
                    this.joystickActive = false;
                    this.joystickX = 0;
                    this.joystickY = 0;
                    joystickHandle.style.transform = 'translate(-50%, -50%)';
                    
                    input.left = false;
                    input.right = false;
                    input.up = false;
                    input.down = false;
                };
                
                joystickContainer.addEventListener('touchstart', handleStart, {passive: false});
                joystickContainer.addEventListener('touchmove', handleMove, {passive: false});
                joystickContainer.addEventListener('touchend', handleEnd, {passive: false});
                
                joystickContainer.addEventListener('mousedown', handleStart);
                document.addEventListener('mousemove', handleMove);
                document.addEventListener('mouseup', handleEnd);
            }
            
            updateJoystick(e) {
                const joystickContainer = document.querySelector('.joystick-container');
                const joystickHandle = document.getElementById('joystickHandle');
                const rect = joystickContainer.getBoundingClientRect();
                
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let deltaX = clientX - centerX;
                let deltaY = clientY - centerY;
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const maxDistance = rect.width / 2 - 25;
                
                if (distance > maxDistance) {
                    deltaX = (deltaX / distance) * maxDistance;
                    deltaY = (deltaY / distance) * maxDistance;
                }
                
                joystickHandle.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                
                this.joystickX = deltaX / maxDistance;
                this.joystickY = deltaY / maxDistance;
                
                // Actualizar input
                input.left = this.joystickX < -0.3;
                input.right = this.joystickX > 0.3;
                input.up = this.joystickY < -0.3;
                input.down = this.joystickY > 0.3;
            }
